bundle:
  name: zscaler-email-agent

variables:
  catalog:
    description: "Unity Catalog catalog name (must already exist)"
    default: "main"
  schema:
    description: "UC schema name — will be created if it does not exist"
    default: "zscaler"

targets:
  dev:
    default: true
    mode: development

include:
  - resources/*.yml
